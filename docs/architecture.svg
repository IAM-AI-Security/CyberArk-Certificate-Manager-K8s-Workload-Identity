<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>CyberArk Certificate Manager for Kubernetes Architecture</title>
<desc>Structural diagram showing Minikube cluster connected to CyberArk Certificate Manager SaaS via venafi-kubernetes-agent, with cert-manager issuing certificates through VenafiConnection and enforced by Workload Issuance Policy</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- CyberArk CM SaaS container -->
<rect x="160" y="30" width="360" height="108" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">CyberArk Certificate Manager SaaS</text>

<!-- Workload Issuance Policy -->
<rect x="190" y="76" width="148" height="44" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="264" y="93" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#72243E">Workload issuance policy</text>
<text x="264" y="110" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#993556">1 hour cert validity</text>

<!-- Certificate inventory -->
<rect x="352" y="76" width="148" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="426" y="93" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">Certificate inventory</text>
<text x="426" y="110" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#0F6E56">Lifecycle + visibility</text>

<!-- Arrows SaaS to cluster -->
<line x1="280" y1="138" x2="280" y2="200" stroke="#7F77DD" stroke-width="1" fill="none" marker-end="url(#arrow-purple)"/>
<line x1="400" y1="138" x2="400" y2="200" stroke="#1D9E75" stroke-width="1" fill="none" marker-end="url(#arrow-teal)"/>

<!-- Minikube cluster container -->
<rect x="40" y="200" width="600" height="270" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="228" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Minikube cluster (gca-minikube-cluster)</text>
<text x="340" y="247" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#185FA5">Kubernetes v1.38.1 — venafi namespace + cert-manager namespace</text>

<!-- venafi-kubernetes-agent -->
<rect x="62" y="264" width="178" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="151" y="287" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">venafi-kubernetes-agent</text>
<text x="151" y="305" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#534AB7">v1.10.1 — cluster reporting</text>

<!-- VenafiConnection -->
<rect x="258" y="264" width="164" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="287" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">VenafiConnection</text>
<text x="340" y="305" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#5F5E5A">venafi-components</text>

<!-- cert-manager -->
<rect x="440" y="264" width="178" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="529" y="287" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">cert-manager</text>
<text x="529" y="305" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#0F6E56">v1.16.2 — certificate CRDs</text>

<!-- Arrow agent to VenafiConnection -->
<line x1="240" y1="292" x2="256" y2="292" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Arrow VenafiConnection to cert-manager -->
<line x1="422" y1="292" x2="438" y2="292" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Workload pod -->
<rect x="170" y="376" width="360" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="350" y="399" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#633806">Workload pod</text>
<text x="350" y="417" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#854F0B">Requests TLS cert via Certificate resource</text>

<!-- Arrow cert-manager to workload -->
<path d="M529 320 L529 404 L532 404" fill="none" stroke="#5F5E5A" stroke-width="1"/>
<path d="M529 404 L352 404" fill="none" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow workload to VenafiConnection -->
<line x1="340" y1="376" x2="340" y2="322" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- Footer -->
<text x="340" y="492" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="11" fill="#888780">Zero Standing Privilege enforced by 1-hour certificate validity on gca-workload-identity-policy</text>
</svg>
