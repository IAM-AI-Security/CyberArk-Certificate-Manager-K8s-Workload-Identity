apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-gocloudarchitects
  namespace: venafi
spec:
  secretName: demo-gocloudarchitects-tls
  duration: 90d
  renewBefore: 15d
  commonName: demo.gocloudarchitects.com
  dnsNames:
    - demo.gocloudarchitects.com
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: venafi-issuer
    kind: ClusterIssuer
